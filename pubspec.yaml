name: readflow
description: A cross-platform local-first RSS reader for Windows and Android.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  file_picker: ^8.1.7
  flutter_html: ^3.0.0-beta.2
  flutter_local_notifications: ^18.0.1
  flutter_riverpod: ^2.6.1
  html: ^0.15.4
  path: ^1.9.0
  path_provider: ^2.1.5
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  url_launcher: ^6.3.1
  workmanager: ^0.5.2
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
